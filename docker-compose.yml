# Isolated PostgreSQL for awarnes-cyber (host port 35433 → container 5432).
# Use a high port if Windows blocks 5433/5434 (Hyper-V excluded ranges).
services:
  db:
    image: postgres:16-alpine
    container_name: awarnes-cyber-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyberaware
    ports:
      - "35433:5432"
    volumes:
      - awarnes_cyber_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyberaware"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  awarnes_cyber_pgdata:
